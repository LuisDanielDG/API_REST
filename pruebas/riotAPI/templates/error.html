$def with (error_message)
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - League of Legends</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Crimson Text, serif;
            background: linear-gradient(135deg, #0a1e2e 0%, #16395c 50%, #0a1e2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e8d7c3;
        }
        .container {
            background: linear-gradient(135deg, rgba(10, 30, 46, 0.95) 0%, rgba(22, 57, 92, 0.95) 100%);
            border-radius: 0;
            box-shadow: 0 0 50px rgba(231, 76, 60, 0.3), inset 0 0 30px rgba(231, 76, 60, 0.1);
            max-width: 700px;
            width: 100%;
            border: 3px solid #e74c3c;
            padding: 50px;
            text-align: center;
        }
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
            color: #e74c3c;
        }
        h1 {
            font-family: Playfair Display, serif;
            color: #e74c3c;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }
        .error-message {
            color: #d4af37;
            font-size: 18px;
            margin: 30px 0;
            background: rgba(231, 76, 60, 0.1);
            padding: 25px;
            border-left: 4px solid #e74c3c;
            border-right: 4px solid #e74c3c;
            line-height: 1.8;
            text-align: left;
        }
        .error-description {
            color: #a8860d;
            font-size: 16px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        a.button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #daa520 0%, #f0e68c 100%);
            color: #0a1e2e;
            text-decoration: none;
            border-radius: 0;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(218, 165, 32, 0.4);
            transition: all 0.3s;
            font-family: Playfair Display, serif;
            font-size: 16px;
            margin-top: 20px;
        }
        a.button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(218, 165, 32, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">X</div>
        <h1>Error</h1>
        <div class="error-description">Campeon No Encontrado</div>
        
        <div class="error-message">
            $error_message
        </div>
        
        <p style="color: #e8d7c3; margin-bottom: 20px;">Verifica el nombre del campeon e intenta nuevamente.</p>
        
        <a href="/" class="button">Volver a Buscar</a>
    </div>
</body>
</html>
