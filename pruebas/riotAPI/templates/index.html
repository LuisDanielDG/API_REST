$def with (total_champions, champion_list)

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>League of Legends</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Crimson Text, serif;
            background: linear-gradient(135deg, #0a1e2e 0%, #16395c 50%, #0a1e2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e8d7c3;
        }
        .container {
            background: linear-gradient(135deg, rgba(10, 30, 46, 0.95) 0%, rgba(22, 57, 92, 0.95) 100%);
            padding: 50px;
            border-radius: 0;
            box-shadow: 0 0 50px rgba(218, 165, 32, 0.3), inset 0 0 30px rgba(218, 165, 32, 0.1);
            max-width: 700px;
            width: 100%;
            border: 3px solid #daa520;
            position: relative;
        }
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #daa520 0%, #f0e68c 50%, #daa520 100%);
        }
        .container::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #daa520 0%, #f0e68c 50%, #daa520 100%);
        }
        h1 {
            font-family: Playfair Display, serif;
            color: #daa520;
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(218, 165, 32, 0.5);
            letter-spacing: 3px;
        }
        .subtitle {
            text-align: center;
            color: #a8860d;
            font-size: 14px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .info {
            background: rgba(218, 165, 32, 0.1);
            padding: 20px;
            margin: 30px 0;
            border-left: 4px solid #daa520;
            border-right: 4px solid #daa520;
            text-align: center;
            font-size: 18px;
        }
        .info strong {
            color: #f0e68c;
        }
        .search-box {
            margin: 40px 0;
        }
        .search-box form {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #daa520;
            background: rgba(168, 134, 13, 0.1);
            color: #e8d7c3;
            font-family: Crimson Text, serif;
        }
        .search-box input::placeholder {
            color: #a8860d;
        }
        .search-box input:focus {
            outline: none;
            background: rgba(168, 134, 13, 0.2);
            box-shadow: 0 0 20px rgba(218, 165, 32, 0.5);
        }
        .search-box button {
            padding: 15px 35px;
            font-size: 16px;
            background: linear-gradient(135deg, #daa520 0%, #f0e68c 100%);
            color: #0a1e2e;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-family: Playfair Display, serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(218, 165, 32, 0.4);
            transition: all 0.3s;
        }
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(218, 165, 32, 0.6);
            background: linear-gradient(135deg, #f0e68c 0%, #daa520 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>League of Legends API</h1>
        <div class="subtitle">Buscador de campeones</div>
        
        <div class="info">
            <p>Campeones Disponibles: <strong>$total_champions</strong></p>
        </div>
        
        <div class="search-box">
            <form method="GET" action="/champion">
                <input type="text" name="name" placeholder="Ingresa el nombre del campeon..." required>
                <button type="submit">Buscar</button>
            </form>
        </div>
    </div>
</body>
</html>
